name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create zip from symbiote contents
        working-directory: symbiotes/never-stop-blowing-up
        run: zip -r "$GITHUB_WORKSPACE/never-stop-blowing-up-${{ steps.version.outputs.VERSION }}.zip" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Never Stop Blowing Up Companion ${{ github.ref_name }}"
          generate_release_notes: true
          files: never-stop-blowing-up-${{ steps.version.outputs.VERSION }}.zip
